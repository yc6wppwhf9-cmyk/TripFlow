<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripFlow | Page Not Found</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
</head>
<body class="bg-background text-on-surface" style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;">
    <div style="text-align:center;max-width:420px;">
        <div style="font-family:var(--font-display);font-size:6rem;font-weight:700;color:var(--primary);line-height:1;margin-bottom:1rem;">404</div>
        <h1 style="font-size:1.4rem;font-weight:600;color:var(--on-surface);margin-bottom:0.5rem;">Page not found</h1>
        <p style="font-size:0.9rem;color:var(--secondary);font-weight:500;margin-bottom:2rem;">The page you're looking for doesn't exist or you may not have access to it.</p>
        <div style="display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;">
            <button onclick="history.back()" class="secondary" style="width:auto;padding:0.6rem 1.5rem;">Go Back</button>
            <a href="index.html" style="text-decoration:none;">
                <button style="width:auto;padding:0.6rem 1.5rem;background:var(--primary);color:#fff;border-color:transparent;">Go to Login</button>
            </a>
        </div>
    </div>
</body>
</html>
