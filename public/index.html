<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripFlow | Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            min-height: 100vh;
            background: #f5f0e8; /* Warm aged paper */
            font-family: 'Inter', system-ui, sans-serif;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        main {
            width: 100%;
            max-width: 460px;
            position: relative;
        }

        /* ── Header / Brand ── */
        .brand-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }
        .brand-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -0.04em;
            color: #1a1a1a;
            line-height: 0.9;
        }
        .brand-tag {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            background: #ffcc00;
            padding: 0.2rem 0.5rem;
            border: 2px solid #1a1a1a;
            box-shadow: 2px 2px 0px #1a1a1a;
        }

        /* ── Brutalist Card ── */
        .brutalist-card {
            background: #ffffff;
            border: 3px solid #1a1a1a;
            box-shadow: 6px 6px 0px #1a1a1a;
            padding: 2.5rem 2rem;
            margin-bottom: 2rem;
        }

        .card-head {
            margin-bottom: 2rem;
            border-bottom: 3px solid #1a1a1a;
            padding-bottom: 1rem;
        }
        .card-head h2 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1a1a1a;
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }

        /* ── Fields ── */
        .field {
            margin-bottom: 1.5rem;
        }
        .field-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.5rem;
        }
        .field label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .field a {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #0055ff;
            text-decoration: none;
        }
        .field a:hover {
            text-decoration: underline;
        }

        .input-wrap {
            position: relative;
        }
        .input-wrap input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 3px solid #1a1a1a;
            padding: 0.75rem 0.25rem;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            color: #1a1a1a;
            outline: none;
            transition: all 0.15s steps(4);
        }
        .input-wrap input::placeholder {
            color: rgba(26,26,26,0.35);
        }
        .input-wrap input:focus {
            border-bottom-color: #0055ff;
            background: rgba(0,85,255,0.04);
        }

        .toggle-pw {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #1a1a1a;
            padding: 0;
            display: flex;
            align-items: center;
        }

        /* ── Checkbox ── */
        .remember-wrap {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }
        .remember-wrap input[type="checkbox"] {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 3px solid #1a1a1a;
            background: #ffffff;
            cursor: pointer;
            position: relative;
            outline: none;
            transition: all 0.1s steps(2);
        }
        .remember-wrap input[type="checkbox"]:checked {
            background: #ffcc00;
        }
        .remember-wrap input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-weight: 900;
            font-size: 12px;
            color: #1a1a1a;
        }
        .remember-wrap label {
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        /* ── Buttons ── */
        .btn-primary {
            width: 100%;
            padding: 0.875rem 1.5rem;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            border: 3px solid #1a1a1a;
            background: #ffcc00; /* Accent Yellow */
            color: #1a1a1a;
            box-shadow: 4px 4px 0px #1a1a1a;
            transition: all 0.15s steps(4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-primary:hover:not(:disabled) {
            background: #1a1a1a;
            color: #ffcc00;
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #1a1a1a;
        }
        .btn-primary:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px #1a1a1a;
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .divider-or {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .divider-or::before, .divider-or::after {
            content: '';
            flex: 1;
            height: 3px;
            background: #1a1a1a;
        }
        .divider-or span {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #1a1a1a;
        }

        .btn-sso {
            width: 100%;
            padding: 0.875rem 1.5rem;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            border: 3px solid #1a1a1a;
            background: #ffffff;
            color: #1a1a1a;
            box-shadow: 4px 4px 0px #1a1a1a;
            transition: all 0.15s steps(4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-sso:hover {
            background: #1a1a1a;
            color: #ffffff;
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #1a1a1a;
        }
        .btn-sso:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px #1a1a1a;
        }

        /* ── Error Box ── */
        .error-box {
            display: none;
            margin-top: 1.5rem;
            padding: 1rem;
            background: #e63b2e;
            color: #ffffff;
            border: 3px solid #1a1a1a;
            box-shadow: 4px 4px 0px #1a1a1a;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        /* ── Footer ── */
        .login-footer {
            text-align: center;
        }
        .login-footer p {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .login-footer p a {
            color: #0055ff;
            text-decoration: none;
            font-weight: 700;
        }
        .login-footer p a:hover {
            text-decoration: underline;
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .footer-links a {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #1a1a1a;
            text-decoration: none;
        }
        .footer-links a:hover {
            color: #0055ff;
        }

        /* ── Side Info Block (Desktop Only) ── */
        .brutalist-badge {
            display: none;
            position: fixed;
            right: 2rem;
            bottom: 2rem;
            max-width: 320px;
            background: #ffffff;
            border: 3px solid #1a1a1a;
            box-shadow: 6px 6px 0px #1a1a1a;
            padding: 1.5rem;
        }
        .brutalist-badge .bb-title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            color: #e63b2e;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .brutalist-badge p {
            font-size: 0.85rem;
            font-weight: 500;
            line-height: 1.4;
        }

        @media (min-width: 1200px) {
            .brutalist-badge { display: block; }
        }
    </style>
</head>
<body>

    <main>
        <!-- Brand -->
        <div class="brand-header">
            <svg class="brand-logo" width="40" height="40" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" style="border: 2px solid #1a1a1a; box-shadow: 2px 2px 0px #1a1a1a; flex-shrink: 0; display: block;">
                <!-- Black rounded box -->
                <rect width="512" height="512" rx="96" fill="#000000"/>
                <!-- TF Letters -->
                <!-- Top bar of T -->
                <rect x="128" y="128" width="224" height="96" rx="48" fill="#0055ff"/>
                <!-- Vertical stem -->
                <rect x="176" y="224" width="64" height="160" rx="32" fill="#0055ff"/>
                <!-- Middle bar of F -->
                <rect x="240" y="272" width="112" height="80" rx="40" fill="#004acc"/>
                <!-- Light Blue Dot -->
                <circle cx="304" cy="176" r="24" fill="#4a8ef7"/>
            </svg>
            <h1 class="brand-name">TripFlow</h1>
            <span class="brand-tag">Enterprise</span>
        </div>

        <!-- Card -->
        <div class="brutalist-card">
            <div class="card-head">
                <h2>Sign In</h2>
                <p>Corporate Travel Portal</p>
            </div>

            <form id="login-form" autocomplete="on">
                <div class="field">
                    <label for="email">Corporate Email</label>
                    <div class="input-wrap">
                        <input type="email" id="email" name="email" required
                               placeholder="john.doe@company.com" autocomplete="email">
                    </div>
                </div>

                <div class="field">
                    <div class="field-row">
                        <label for="password">Password</label>
                        <a href="#">Forgot?</a>
                    </div>
                    <div class="input-wrap">
                        <input type="password" id="password" name="password" required
                               placeholder="••••••••" autocomplete="current-password"
                               style="padding-right: 2.5rem;">
                        <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Show password">
                            <span class="material-symbols-outlined" style="font-size: 20px;">visibility</span>
                        </button>
                    </div>
                </div>

                <div class="remember-wrap">
                    <input type="checkbox" id="remember">
                    <label for="remember">Remember Device</label>
                </div>

                <button type="submit" class="btn-primary" id="sign-in-btn">
                    Sign In
                    <span class="material-symbols-outlined" style="font-size: 20px;">arrow_forward</span>
                </button>
            </form>

            <div class="error-box" id="error-msg"></div>
        </div>
    </main>

    <!-- Side Badge -->
    <div class="brutalist-badge">
        <div class="bb-title">
            <span class="material-symbols-outlined" style="font-size:20px;font-variation-settings:'FILL' 1;">security</span>
            SOC2 COMPLIANT
        </div>
        <p>Your travel bookings and enterprise data are protected under SOC2 Type II standards and full-spectrum encryption.</p>
    </div>

    <script src="js/auth.js"></script>
    <script>
        checkAuth();

        const toggleBtn = document.getElementById('toggle-pw');
        const pwField   = document.getElementById('password');
        const icon      = toggleBtn.querySelector('.material-symbols-outlined');
        toggleBtn.addEventListener('click', () => {
            const isHidden = pwField.type === 'password';
            pwField.type   = isHidden ? 'text' : 'password';
            icon.textContent = isHidden ? 'visibility_off' : 'visibility';
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('error-msg');
            const btn      = document.getElementById('sign-in-btn');

            errorBox.style.display = 'none';
            btn.disabled    = true;
            btn.innerHTML   = 'Signing in…';

            try {
                const data = await login(email, password);
                const routes = {
                    ADMIN: 'admin.html', MANAGER: 'manager.html',
                    VENDOR: 'vendor.html', HR: 'hr.html', EMPLOYEE: 'employee.html'
                };
                window.location.href = routes[data.role] || 'employee.html';
            } catch (err) {
                errorBox.textContent   = err.message || 'Invalid credentials. Please try again.';
                errorBox.style.display = 'block';
                btn.disabled           = false;
                btn.innerHTML = 'Sign In <span class="material-symbols-outlined" style="font-size:20px;">arrow_forward</span>';
            }
        });
    </script>
</body>
</html>
