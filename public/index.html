<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripDesk | Premium Corporate Travel</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 3.5rem;
            text-align: center;
        }
        .login-logo {
            font-size: 2.5rem;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-card glass">
        <div class="logo login-logo">TripDesk</div>
        <h2 style="margin-bottom: 0.5rem;">Welcome back</h2>
        <p style="color: var(--text-muted); margin-bottom: 2.5rem;">Please enter your details to sign in.</p>
        
        <form id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="name@company.com" style="width: 100%;">
            </div>
            <div class="form-group" style="margin-bottom: 2rem;">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••" style="width: 100%;">
            </div>
            <button type="submit" style="width: 100%; padding: 1rem; font-size: 1rem;">Sign In</button>
        </form>
        
        <p id="error-msg" style="color: #e63946; margin-top: 1.5rem; display: none; font-size: 0.9rem;"></p>
        
        <div style="margin-top: 3rem; padding-top: 2rem; border-top: 1px solid #f1f5f9;">
            <p style="font-size: 0.8rem; color: var(--text-muted);">
                Sample Logins:<br>
                hr@tripdesk.com | manager@tripdesk.com | alice@tripdesk.com<br>
                Password: <strong>Welcome@123</strong>
            </p>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            
            try {
                const data = await login(email, password);
                if (data.role === 'ADMIN') window.location.href = 'admin.html';
                else if (data.role === 'MANAGER') window.location.href = 'manager.html';
                else if (data.role === 'VENDOR') window.location.href = 'vendor.html';
                else window.location.href = 'employee.html';
            } catch (err) {
                errorMsg.innerText = err.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
