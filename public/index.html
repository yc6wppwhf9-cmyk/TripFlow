<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TripFlow | Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#003d9b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue-mid:    #003d9b;
      --blue-bright: #0052cc;
      --text:        #191b23;
      --text-muted:  #585f6c;
      --border:      #c3c6d6;
      --surface:     #ffffff;
      --bg:          #f0f3ff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text:       #e4e6f0;
        --text-muted: #9aa0b8;
        --border:     #2e3150;
        --surface:    #1a1d2e;
        --bg:         #12141f;
      }
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(ellipse at 20% 0%,  rgba(0,61,155,0.10) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 100%, rgba(0,82,204,0.08) 0%, transparent 55%),
        var(--bg);
      padding: 2rem 1rem;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Wrapper ── */
    .page-wrap {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      animation: fadeInUp 0.45s cubic-bezier(.22,.68,0,1.2) both;
    }

    /* ── Brand Header ── */
    .brand-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      text-align: center;
    }
    .brand-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .brand-row img {
      width: 38px; height: 38px;
      border-radius: 9px;
      object-fit: contain;
    }
    .brand-name {
      font-size: 1.65rem;
      font-weight: 800;
      color: var(--blue-mid);
      letter-spacing: -0.025em;
    }
    .brand-sub {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* ── Tab Switcher ── */
    .tab-switcher {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px;
      width: 100%;
      gap: 4px;
    }
    .tab-btn {
      flex: 1;
      padding: 0.6rem 1rem;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s ease;
      background: transparent;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }
    .tab-btn .material-symbols-outlined { font-size: 16px; }
    .tab-btn.active {
      background: var(--blue-mid);
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,61,155,0.25);
    }
    .tab-btn:not(.active):hover {
      background: #f0f3ff;
      color: var(--blue-mid);
    }

    /* ── Card ── */
    .form-card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
      padding: 2rem 2rem;
    }

    .form-section { display: none; }
    .form-section.active { display: block; }

    .form-section-title {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }
    .form-section-sub {
      font-size: 0.84rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    /* ── Two-column grid for register ── */
    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 1rem;
    }
    .field-grid .field-full { grid-column: 1 / -1; }

    /* ── Fields ── */
    .field { margin-bottom: 1.1rem; }
    .field-hd {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.4rem;
    }
    .field-hd label { font-size: 0.79rem; font-weight: 600; color: #434654; }
    .field-hd a {
      font-size: 0.77rem; font-weight: 600;
      color: var(--blue-mid); text-decoration: none;
    }
    .field-hd a:hover { text-decoration: underline; }

    .inp-wrap { position: relative; }
    .inp-wrap input, .inp-wrap select {
      width: 100%;
      background: #f8f9ff;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0.7rem 0.9rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      outline: none;
      transition: all 0.18s ease;
      display: block;
      appearance: none;
    }
    .inp-wrap input::placeholder { color: #9aa0af; font-weight: 400; }
    .inp-wrap input:focus, .inp-wrap select:focus {
      border-color: var(--blue-mid);
      background: var(--surface);
      box-shadow: 0 0 0 3.5px rgba(0,61,155,0.1);
    }

    @media (prefers-color-scheme: dark) {
      .inp-wrap input, .inp-wrap select { background: #1e2133; }
      .inp-wrap input:focus, .inp-wrap select:focus { background: #222640; }
      .field-hd label { color: #b0b8d0; }
    }

    .toggle-pw {
      position: absolute; right: 0.75rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 0;
      color: #9aa0af; display: flex; align-items: center;
      min-height: unset; box-shadow: none;
    }
    .toggle-pw:hover { color: var(--text); background: none; box-shadow: none; }
    .toggle-pw .material-symbols-outlined { font-size: 18px; }

    .remember-row {
      display: flex; align-items: center; gap: 0.5rem;
      margin-bottom: 1.4rem;
    }
    .remember-row input[type="checkbox"] {
      width: 16px; height: 16px; appearance: none;
      border: 1.5px solid var(--border); border-radius: 4px;
      background: #f8f9ff; cursor: pointer; position: relative;
      flex-shrink: 0; outline: none; transition: all 0.15s ease;
    }
    .remember-row input[type="checkbox"]:checked {
      background: var(--blue-mid); border-color: var(--blue-mid);
    }
    .remember-row input[type="checkbox"]:checked::after {
      content: '✓'; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 10px; font-weight: 700; color: #fff;
    }
    .remember-row label { font-size: 0.83rem; font-weight: 500; color: #434654; cursor: pointer; }

    .btn-submit {
      width: 100%; padding: 0.8rem 1.5rem;
      font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.92rem;
      cursor: pointer; border-radius: 10px; border: none;
      background: linear-gradient(135deg, #003d9b 0%, #0055d4 100%);
      color: #fff; transition: all 0.2s ease;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      box-shadow: 0 4px 14px rgba(0,61,155,0.28);
      min-height: unset; letter-spacing: 0.01em;
      margin-top: 0.25rem;
    }
    .btn-submit:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 7px 20px rgba(0,61,155,0.38);
      background: linear-gradient(135deg, #0047b3 0%, #0066ff 100%);
    }
    .btn-submit:active:not(:disabled) { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-submit .material-symbols-outlined { font-size: 18px; }

    .msg-box {
      display: none; margin-top: 1rem;
      padding: 0.7rem 1rem; border-radius: 9px;
      font-size: 0.83rem; font-weight: 600; text-align: center;
    }

    /* ── Footer ── */
    .page-footer {
      font-size: 0.72rem;
      color: var(--text-muted);
      opacity: 0.65;
    }

    /* ── Animations ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spinLoad {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .spinning { animation: spinLoad 0.75s linear infinite; display: inline-block; }

    @media (max-width: 480px) {
      .form-card { padding: 1.6rem 1.25rem; }
      .field-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="page-wrap">

    <!-- Brand Header -->
    <div class="brand-header">
      <div class="brand-row">
        <img src="images/Logo.png" alt="TripFlow">
        <span class="brand-name">TripFlow</span>
      </div>
      <p class="brand-sub">Corporate Travel Management Portal</p>
    </div>

    <!-- Tab Switcher -->
    <div class="tab-switcher">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">
        <span class="material-symbols-outlined">login</span>
        Sign In
      </button>
      <button class="tab-btn" id="tab-register" onclick="switchTab('register')">
        <span class="material-symbols-outlined">person_add</span>
        Register
      </button>
    </div>

    <!-- Card -->
    <div class="form-card">

      <!-- ── Sign In ── -->
      <div id="section-login" class="form-section active">
        <div class="form-section-title">Welcome back</div>
        <p class="form-section-sub">Sign in to your travel dashboard</p>

        <form id="login-form" autocomplete="on">
          <div class="field">
            <div class="field-hd">
              <label for="email">Corporate Email</label>
            </div>
            <div class="inp-wrap">
              <input type="email" id="email" name="email" required
                     placeholder="john.doe@company.com" autocomplete="email">
            </div>
          </div>

          <div class="field">
            <div class="field-hd">
              <label for="password">Password</label>
              <a href="#" id="forgot-pw-link">Forgot password?</a>
            </div>
            <div class="inp-wrap">
              <input type="password" id="password" name="password" required
                     placeholder="••••••••" autocomplete="current-password"
                     style="padding-right:2.6rem;">
              <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Show password">
                <span class="material-symbols-outlined">visibility</span>
              </button>
            </div>
          </div>

          <div class="remember-row">
            <input type="checkbox" id="remember">
            <label for="remember">Remember this device</label>
          </div>

          <button type="submit" class="btn-submit" id="sign-in-btn">
            <span class="material-symbols-outlined">login</span>
            Sign In
          </button>
        </form>

        <div class="msg-box" id="login-msg"></div>
      </div>

      <!-- ── Register ── -->
      <div id="section-register" class="form-section">
        <div class="form-section-title">Create account</div>
        <p class="form-section-sub">Register as a new employee</p>

        <form id="register-form" autocomplete="off">
          <div class="field-grid">

            <div class="field">
              <div class="field-hd"><label for="reg-name">Full Name</label></div>
              <div class="inp-wrap">
                <input type="text" id="reg-name" name="name" required
                       placeholder="John Doe" autocomplete="name">
              </div>
            </div>

            <div class="field">
              <div class="field-hd"><label for="reg-dept">Department</label></div>
              <div class="inp-wrap">
                <input type="text" id="reg-dept" name="department"
                       placeholder="Engineering" autocomplete="off">
              </div>
            </div>

            <div class="field field-full">
              <div class="field-hd"><label for="reg-email">Corporate Email</label></div>
              <div class="inp-wrap">
                <input type="email" id="reg-email" name="email" required
                       placeholder="john.doe@company.com" autocomplete="email">
              </div>
            </div>

            <div class="field">
              <div class="field-hd"><label for="reg-phone">Phone <span style="color:#9aa0af;font-weight:400;">(optional)</span></label></div>
              <div class="inp-wrap">
                <input type="tel" id="reg-phone" name="phone"
                       placeholder="+91 98765 43210" autocomplete="tel">
              </div>
            </div>

            <div class="field">
              <div class="field-hd"><label for="reg-password">Password</label></div>
              <div class="inp-wrap">
                <input type="password" id="reg-password" name="password" required
                       placeholder="Min. 8 characters" autocomplete="new-password"
                       style="padding-right:2.6rem;">
                <button type="button" class="toggle-pw" id="toggle-reg-pw" aria-label="Show password">
                  <span class="material-symbols-outlined">visibility</span>
                </button>
              </div>
            </div>

            <div class="field field-full">
              <div class="field-hd"><label for="reg-confirm">Confirm Password</label></div>
              <div class="inp-wrap">
                <input type="password" id="reg-confirm" name="confirm" required
                       placeholder="Re-enter password" autocomplete="new-password">
              </div>
            </div>

          </div>

          <button type="submit" class="btn-submit" id="register-btn">
            <span class="material-symbols-outlined">person_add</span>
            Create Account
          </button>
        </form>

        <div class="msg-box" id="register-msg"></div>
      </div>

    </div><!-- /form-card -->

    <p class="page-footer">© 2025 TripFlow — All rights reserved.</p>

  </div><!-- /page-wrap -->

  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
