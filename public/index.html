<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripFlow | Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            min-height: 100vh;
            background: #faf8ff;
            font-family: 'Inter', system-ui, sans-serif;
            color: #191b23;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            -webkit-font-smoothing: antialiased;
        }

        main {
            width: 100%;
            max-width: 440px;
            position: relative;
        }

        /* ── Header / Brand ── */
        .brand-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            justify-content: center;
        }
        .brand-name {
            font-size: 1.85rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: #003d9b;
            line-height: 1;
        }
        .brand-tag {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            background: #e3f2fd;
            color: #0d47a1;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            letter-spacing: 0.05em;
        }

        /* ── Systematic Card ── */
        .card {
            background: #ffffff;
            border: 1px solid #c3c6d6;
            border-radius: 16px;
            box-shadow: 0px 10px 15px rgba(0,0,0,0.03), 0px 4px 6px rgba(0,0,0,0.02);
            padding: 2.5rem 2rem;
            margin-bottom: 2rem;
        }

        .card-head {
            margin-bottom: 2rem;
            border-bottom: 1px solid #ededf8;
            padding-bottom: 1.25rem;
            text-align: center;
        }
        .card-head h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #191b23;
            letter-spacing: -0.01em;
            margin-bottom: 0.25rem;
        }
        .card-head p {
            font-size: 0.85rem;
            color: #585f6c;
            font-weight: 500;
        }

        /* ── Fields ── */
        .field {
            margin-bottom: 1.5rem;
        }
        .field-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.4rem;
        }
        .field label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #434654;
        }
        .field a {
            font-size: 0.8rem;
            font-weight: 600;
            color: #003d9b;
            text-decoration: none;
        }
        .field a:hover {
            text-decoration: underline;
        }

        .input-wrap {
            position: relative;
        }
        .input-wrap input {
            width: 100%;
            background: #ffffff;
            border: 1px solid #c3c6d6;
            border-radius: 8px;
            padding: 0.65rem 0.85rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.92rem;
            font-weight: 500;
            color: #191b23;
            outline: none;
            transition: all 0.2s ease-in-out;
            display: block;
        }
        .input-wrap input::placeholder {
            color: #737685;
        }
        .input-wrap input:focus {
            border-color: #003d9b;
            box-shadow: 0px 0px 0px 3px rgba(0, 61, 155, 0.12);
        }

        .toggle-pw {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #585f6c;
            padding: 0;
            display: flex;
            align-items: center;
        }
        .toggle-pw:hover {
            color: #191b23;
        }

        /* ── Checkbox ── */
        .remember-wrap {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }
        .remember-wrap input[type="checkbox"] {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 1px solid #c3c6d6;
            border-radius: 4px;
            background: #ffffff;
            cursor: pointer;
            position: relative;
            outline: none;
            transition: all 0.15s ease-in-out;
        }
        .remember-wrap input[type="checkbox"]:checked {
            background: #003d9b;
            border-color: #003d9b;
        }
        .remember-wrap input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-weight: 700;
            font-size: 10px;
            color: #ffffff;
        }
        .remember-wrap label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #434654;
            cursor: pointer;
        }

        /* ── Buttons ── */
        .btn-primary {
            width: 100%;
            padding: 0.75rem 1.5rem;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 8px;
            border: 1px solid #003d9b;
            background: #003d9b;
            color: #ffffff;
            transition: all 0.2s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }
        .btn-primary:hover:not(:disabled) {
            background: #0052cc;
            border-color: #0052cc;
            box-shadow: 0px 2px 4px rgba(0,0,0,0.08);
        }
        .btn-primary:active:not(:disabled) {
            opacity: 0.9;
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ── Error Box ── */
        .error-box {
            display: none;
            margin-top: 1.5rem;
            padding: 0.75rem 1rem;
            background: #ffebee;
            color: #c62828;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
        }

        /* ── Side Badge (Desktop Only) ── */
        .brutalist-badge {
            display: none;
            position: fixed;
            right: 2rem;
            bottom: 2rem;
            max-width: 320px;
            background: #ffffff;
            border: 1px solid #c3c6d6;
            border-radius: 12px;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.03);
            padding: 1.25rem;
        }
        .brutalist-badge .bb-title {
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #003d9b;
            margin-bottom: 0.35rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            letter-spacing: 0.05em;
        }
        .brutalist-badge p {
            font-size: 0.8rem;
            color: #585f6c;
            font-weight: 500;
            line-height: 1.4;
        }

        @media (min-width: 1200px) {
            .brutalist-badge { display: block; }
        }
    </style>
</head>
<body>

    <main>
        <!-- Brand -->
        <div class="brand-header">
            <img class="brand-logo" src="images/Logo.png" alt="TripFlow" style="width: 36px; height: 36px; object-fit: contain; border-radius: 6px; flex-shrink: 0; display: block;">
            <h1 class="brand-name">TripFlow</h1>
            <span class="brand-tag">Enterprise</span>
        </div>

        <!-- Card -->
        <div class="card">
            <div class="card-head">
                <h2>Sign In</h2>
                <p>Corporate Travel Portal</p>
            </div>

            <form id="login-form" autocomplete="on">
                <div class="field">
                    <label for="email">Corporate Email</label>
                    <div class="input-wrap">
                        <input type="email" id="email" name="email" required
                                placeholder="john.doe@company.com" autocomplete="email">
                    </div>
                </div>

                <div class="field">
                    <div class="field-row">
                        <label for="password">Password</label>
                        <a href="#" id="forgot-pw-link">Forgot Password?</a>
                    </div>
                    <div class="input-wrap">
                        <input type="password" id="password" name="password" required
                                placeholder="••••••••" autocomplete="current-password"
                                style="padding-right: 2.5rem;">
                        <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Show password">
                            <span class="material-symbols-outlined" style="font-size: 20px;">visibility</span>
                        </button>
                    </div>
                </div>

                <div class="remember-wrap">
                    <input type="checkbox" id="remember">
                    <label for="remember">Remember Device</label>
                </div>

                <button type="submit" class="btn-primary" id="sign-in-btn">
                    Sign In
                    <span class="material-symbols-outlined" style="font-size: 20px;">arrow_forward</span>
                </button>
            </form>

            <div class="error-box" id="error-msg"></div>
        </div>
    </main>

    <!-- Side Badge -->
    <div class="brutalist-badge">
        <div class="bb-title">
            <span class="material-symbols-outlined" style="font-size:18px;font-variation-settings:'FILL' 1;">security</span>
            SOC2 COMPLIANT
        </div>
        <p>Your travel bookings and enterprise data are protected under SOC2 Type II standards and full-spectrum encryption.</p>
    </div>

    <script src="js/auth.js"></script>
    <script>
        checkAuth();

        document.getElementById('forgot-pw-link').addEventListener('click', (e) => {
            e.preventDefault();
            const errorBox = document.getElementById('error-msg');
            errorBox.style.display = 'block';
            errorBox.style.background = '#e3f2fd';
            errorBox.style.color = '#0d47a1';
            errorBox.textContent = 'To reset your password, contact your HR Travel administrator or email it-support@company.com';
        });

        const toggleBtn = document.getElementById('toggle-pw');
        const pwField   = document.getElementById('password');
        const icon      = toggleBtn.querySelector('.material-symbols-outlined');
        toggleBtn.addEventListener('click', () => {
            const isHidden = pwField.type === 'password';
            pwField.type   = isHidden ? 'text' : 'password';
            icon.textContent = isHidden ? 'visibility_off' : 'visibility';
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('error-msg');
            const btn      = document.getElementById('sign-in-btn');

            errorBox.style.display = 'none';
            btn.disabled    = true;
            btn.innerHTML   = 'Signing in…';

            try {
                const data = await login(email, password);
                const routes = {
                    ADMIN: 'admin.html', MANAGER: 'manager.html',
                    VENDOR: 'vendor.html', HR: 'hr.html', EMPLOYEE: 'employee.html'
                };
                window.location.href = routes[data.role] || 'employee.html';
            } catch (err) {
                errorBox.textContent   = err.message || 'Invalid credentials. Please try again.';
                errorBox.style.display = 'block';
                btn.disabled           = false;
                btn.innerHTML = 'Sign In <span class="material-symbols-outlined" style="font-size:20px;">arrow_forward</span>';
            }
        });
    </script>
</body>
</html>
