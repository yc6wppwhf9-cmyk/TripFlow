<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripFlow | Employee Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .chat-bubble { animation: fadeIn 0.2s ease; }
        #chat-panel { display: none; flex-direction: column; }
        #chat-panel.open { display: flex; }
        #chat-messages::-webkit-scrollbar { width: 4px; }
        #chat-messages::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }
    </style>
</head>
<body>
    <nav class="dashboard-nav glass">
        <div class="logo">TripFlow</div>
        <div class="nav-links">
            <a href="#" class="active">My Trips</a>
            <a href="#" onclick="showBookingModal()">New Request</a>
        </div>
        <div class="user-info">
            <span id="user-name" style="font-weight: 600; color: var(--text-main);"></span>
            <button onclick="logout()" class="secondary" style="width: auto; padding: 0.6rem 1.2rem;">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="header-actions" style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3rem;">
            <div>
                <p style="color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.8rem; margin-bottom: 0.5rem;">Dashboard</p>
                <h1>My Travel Requests</h1>
            </div>
            <button onclick="showBookingModal()" style="padding: 1rem 2rem;">+ New Trip Request</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Type</th>
                        <th>Details</th>
                        <th>Stage</th>
                        <th>Cost</th>
                        <th>PNR</th>
                        <th>Ticket</th>
                    </tr>
                </thead>
                <tbody id="bookings-list">
                    <tr><td colspan="6" style="text-align:center; color:var(--text-muted);">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Manual Booking Modal -->
    <div id="booking-modal" class="modal">
        <div class="modal-content" style="max-width:600px; padding:2.5rem;">

            <!-- Header -->
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.75rem;">
                <div>
                    <h2 style="margin:0; font-size:1.4rem; letter-spacing:-0.5px;">New Travel Request</h2>
                    <p style="margin:0.25rem 0 0; color:#64748b; font-size:0.85rem;">Fill in the details — live prices load automatically.</p>
                </div>
                <button type="button" onclick="hideBookingModal()" style="background:none; border:none; box-shadow:none; color:#94a3b8; font-size:1.5rem; padding:0; cursor:pointer; line-height:1;">×</button>
            </div>

            <form id="booking-form">

                <!-- Travel type pills -->
                <div class="form-group" style="margin-bottom:1.25rem;">
                    <label style="margin-bottom:0.6rem; display:block;">Travel Type</label>
                    <div style="display:flex; gap:0.5rem;">
                        <label class="type-pill" data-val="FLIGHT" style="flex:1;">
                            <input type="radio" name="travel-type-radio" value="FLIGHT" checked style="display:none;">
                            <span>✈️ Flight</span>
                        </label>
                        <label class="type-pill" data-val="TRAIN" style="flex:1;">
                            <input type="radio" name="travel-type-radio" value="TRAIN" style="display:none;">
                            <span>🚂 Train</span>
                        </label>
                        <label class="type-pill" data-val="HOTEL" style="flex:1;">
                            <input type="radio" name="travel-type-radio" value="HOTEL" style="display:none;">
                            <span>🏨 Hotel</span>
                        </label>
                        <label class="type-pill" data-val="CAB" style="flex:1;">
                            <input type="radio" name="travel-type-radio" value="CAB" style="display:none;">
                            <span>🚖 Cab</span>
                        </label>
                    </div>
                    <input type="hidden" id="travel-type" value="FLIGHT">
                </div>

                <!-- Origin / Destination row -->
                <div style="display:grid; grid-template-columns:1fr auto 1fr; gap:0.75rem; align-items:end; margin-bottom:1.25rem;">
                    <div class="form-group" style="margin:0;" id="origin-group">
                        <label>From</label>
                        <input type="text" id="origin" required placeholder="e.g. Mumbai" autocomplete="off" onblur="fetchSuggestions()">
                    </div>
                    <div style="padding-bottom:0.9rem; color:#94a3b8; font-size:1.2rem;">→</div>
                    <div class="form-group" style="margin:0;">
                        <label id="dest-label">To</label>
                        <input type="text" id="destination" required placeholder="e.g. Delhi" autocomplete="off" onblur="fetchSuggestions()">
                    </div>
                </div>

                <!-- Dates row -->
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; margin-bottom:1.25rem;" id="dates-row">
                    <div class="form-group" style="margin:0;">
                        <label id="date-label">Travel Date</label>
                        <input type="date" id="travel-date" required onchange="fetchSuggestions()">
                    </div>
                    <div class="form-group" style="margin:0;" id="checkout-group" style="display:none;">
                        <label>Check-out Date</label>
                        <input type="date" id="checkout-date" onchange="fetchSuggestions()">
                    </div>
                </div>

                <!-- Live prices panel -->
                <div id="suggestions-container" style="display:none; margin-bottom:1.25rem; background:#f0f4ff; border:1px solid #c7d2fe; border-radius:12px; overflow:hidden;">
                    <div style="padding:0.65rem 1rem; background:#e0e7ff; display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:0.82rem; font-weight:700; color:#3730a3; text-transform:uppercase; letter-spacing:0.05em;">Live Prices</span>
                        <span id="suggestions-loading" style="font-size:0.75rem; color:#6366f1; display:none;">Fetching…</span>
                    </div>
                    <div id="suggestions-content" style="padding:0.75rem 1rem; font-size:0.83rem;"></div>
                </div>

                <!-- Cost row -->
                <div class="form-group" style="margin-bottom:1.75rem;">
                    <label>Estimated Cost (₹) <span style="font-size:0.75rem; color:#6366f1; font-weight:400;">— auto-filled from prices above, or enter manually</span></label>
                    <input type="number" id="estimated-cost" required min="1" placeholder="0">
                </div>

                <!-- Actions -->
                <div style="display:flex; gap:0.75rem;">
                    <button type="submit" style="flex:2; padding:1rem; font-size:0.95rem;">Submit Request</button>
                    <button type="button" onclick="hideBookingModal()" class="secondary" style="flex:1; padding:1rem; font-size:0.95rem;">Cancel</button>
                </div>

            </form>
        </div>
    </div>

    <style>
        .type-pill {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.55rem 0.5rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            color: #64748b;
            transition: all 0.15s;
            text-align: center;
            user-select: none;
        }
        .type-pill:hover { border-color: #a5b4fc; color: #4338ca; }
        .type-pill.active { border-color: #6366f1; background: #e0e7ff; color: #3730a3; }
    </style>

    <!-- AI Chat Widget -->
    <div id="ai-chat" style="position: fixed; bottom: 2rem; right: 2rem; z-index: 1000;">

        <!-- Chat Panel -->
        <div id="chat-panel" style="position: absolute; bottom: 70px; right: 0; width: 360px; height: 520px; background: white; border-radius: 20px; box-shadow: 0 8px 40px rgba(0,0,0,0.18); overflow: hidden;">
            <!-- Header -->
            <div style="padding: 1.1rem 1.4rem; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; display: flex; align-items: center; gap: 0.75rem;">
                <div style="width: 38px; height: 38px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">✈️</div>
                <div style="flex: 1;">
                    <div style="font-weight: 700; font-size: 0.95rem;">TripFlow Assistant</div>
                    <div style="font-size: 0.72rem; opacity: 0.85;">AI-powered travel booking</div>
                </div>
                <button onclick="toggleChat()" style="background: rgba(255,255,255,0.2); border: none; color: white; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; padding: 0;">×</button>
            </div>

            <!-- Messages -->
            <div id="chat-messages" style="flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.65rem; height: 370px; background: #f8fafc;"></div>

            <!-- Input -->
            <div style="padding: 0.9rem 1rem; border-top: 1px solid #e2e8f0; display: flex; gap: 0.5rem; background: white; align-items: center;">
                <input id="chat-input" placeholder="Describe your travel need..." style="flex: 1; border: 1px solid #e2e8f0; border-radius: 10px; padding: 0.65rem 0.9rem; font-size: 0.875rem; outline: none; font-family: inherit;" onkeydown="if(event.key==='Enter' && !event.shiftKey){ event.preventDefault(); sendChat(); }">
                <button id="voice-btn" onclick="toggleVoice()" title="Voice input" style="width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid #e2e8f0; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; transition: background 0.2s;">🎤</button>
                <button onclick="sendChat()" id="chat-send" style="width: auto; padding: 0.65rem 1rem; border-radius: 10px; font-size: 0.875rem; background: linear-gradient(135deg, #6366f1, #8b5cf6); min-width: 60px;">Send</button>
            </div>
        </div>

        <!-- Toggle Button -->
        <button id="chat-btn" onclick="toggleChat()" style="width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; cursor: pointer; box-shadow: 0 4px 20px rgba(99,102,241,0.45); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: transform 0.2s; color: white; position: relative; z-index: 1;">
            ✈️
        </button>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let currentUser = null;
        let chatMessages = [];
        let chatOpen = false;

        async function init() {
            currentUser = checkAuth();
            if (!currentUser) return;
            document.getElementById('user-name').innerText = currentUser.name;
            await loadBookings();
        }
        init();

        async function loadBookings() {
            try {
                const bookings = await apiRequest('/bookings/mine');
                const list = document.getElementById('bookings-list');
                if (!bookings.length) {
                    list.innerHTML = '<tr><td colspan="6" style="text-align:center; color:var(--text-muted); padding: 2rem;">No travel requests yet. Use the AI assistant or click + New Trip Request.</td></tr>';
                    return;
                }
                list.innerHTML = bookings.map(b => `
                    <tr>
                        <td style="font-weight: 700; color: var(--text-main);">${b.type}</td>
                        <td>
                            <div style="font-weight: 500;">${b.details.origin || '—'} → ${b.details.destination || '—'}</div>
                            <div style="font-size: 0.8rem; color: var(--text-muted);">${b.details.date || ''}</div>
                        </td>
                        <td><span class="badge badge-${b.stage.toLowerCase().replace(/_/g, '-')}">${b.stage.replace(/_/g, ' ')}</span></td>
                        <td style="font-weight: 600;">${b.cost ? '₹' + Number(b.cost).toLocaleString('en-IN') : '—'}</td>
                        <td style="font-family: monospace; color: var(--accent);">${b.pnr || '—'}</td>
                        <td>${b.ticketUrl ? `<a href="${b.ticketUrl}" target="_blank" style="color: var(--accent); font-weight: 600; text-decoration: none;">View</a>` : '—'}</td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err.message);
            }
        }

        // ── Manual Booking Modal ──────────────────────────────────
        function showBookingModal() {
            document.getElementById('booking-modal').style.display = 'flex';
            updateFormForType('FLIGHT');
        }
        function hideBookingModal() {
            document.getElementById('booking-modal').style.display = 'none';
            document.getElementById('suggestions-container').style.display = 'none';
            document.getElementById('booking-form').reset();
            document.getElementById('estimated-cost').value = '';
            updateFormForType('FLIGHT');
        }

        // Wire up type pills
        document.querySelectorAll('.type-pill').forEach(pill => {
            pill.addEventListener('click', () => {
                const val = pill.dataset.val;
                document.getElementById('travel-type').value = val;
                document.querySelectorAll('.type-pill').forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                updateFormForType(val);
                fetchSuggestions();
            });
        });
        // Set FLIGHT active on load
        document.querySelector('.type-pill[data-val="FLIGHT"]').classList.add('active');

        function updateFormForType(type) {
            const originGroup = document.getElementById('origin-group');
            const destLabel = document.getElementById('dest-label');
            const dateLabel = document.getElementById('date-label');
            const checkoutGroup = document.getElementById('checkout-group');
            const originInput = document.getElementById('origin');

            if (type === 'HOTEL') {
                originGroup.style.display = 'none';
                originInput.required = false;
                destLabel.textContent = 'City';
                dateLabel.textContent = 'Check-in Date';
                checkoutGroup.style.display = 'block';
            } else {
                originGroup.style.display = 'block';
                originInput.required = true;
                destLabel.textContent = 'To';
                dateLabel.textContent = type === 'CAB' ? 'Pickup Date' : 'Travel Date';
                checkoutGroup.style.display = 'none';
            }
        }

        async function fetchSuggestions() {
            const origin = document.getElementById('origin').value.trim();
            const destination = document.getElementById('destination').value.trim();
            const date = document.getElementById('travel-date').value;
            const type = document.getElementById('travel-type').value;
            if (!destination || !date) return;
            if (type !== 'HOTEL' && !origin) return;

            const container = document.getElementById('suggestions-container');
            const content = document.getElementById('suggestions-content');
            const loadingLabel = document.getElementById('suggestions-loading');
            container.style.display = 'block';
            content.innerHTML = '';
            loadingLabel.style.display = 'inline';

            try {
                const checkOut = document.getElementById('checkout-date')?.value || '';
                const params = new URLSearchParams({ origin, destination, date, type });
                if (checkOut) params.set('checkOut', checkOut);
                const data = await apiRequest(`/bookings/suggestions?${params}`);
                loadingLabel.style.display = 'none';

                const results = Array.isArray(data.results) ? data.results : [];

                if (!results.length || results.available === false) {
                    content.innerHTML = `<p style="color:#64748b; font-size:0.82rem;">${data.results?.reason || 'No options found for this route and date.'}</p>`;
                    return;
                }

                // Auto-fill cost with cheapest option
                const cheapest = results.reduce((min, r) => {
                    const p = r.price || r.pricePerNight || r.totalPrice || 0;
                    return p && p < (min || Infinity) ? p : min;
                }, 0);
                if (cheapest > 0) document.getElementById('estimated-cost').value = cheapest;

                // Render results by type
                let html = '<div style="display:flex; flex-direction:column; gap:0.5rem;">';
                results.forEach((r, i) => {
                    let line = '';
                    if (type === 'FLIGHT') {
                        line = `<strong>${r.airline}</strong> ${r.flightNumber} &nbsp;·&nbsp; ${r.departure?.slice(11,16) || '—'} → ${r.arrival?.slice(11,16) || '—'} &nbsp;·&nbsp; ${r.duration || ''} &nbsp;·&nbsp; <strong style="color:#4338ca;">₹${r.price?.toLocaleString()}</strong>`;
                    } else if (type === 'TRAIN') {
                        line = `<strong>${r.trainName}</strong> (${r.trainNumber}) &nbsp;·&nbsp; Dep ${r.departure} → Arr ${r.arrival} &nbsp;·&nbsp; <span style="color:#64748b; font-size:0.8rem;">${r.note || ''}</span>`;
                    } else if (type === 'HOTEL') {
                        line = `<strong>${r.name}</strong> ${'⭐'.repeat(Math.round(r.stars||0))} &nbsp;·&nbsp; ₹${r.pricePerNight?.toLocaleString()}/night &nbsp;·&nbsp; ${r.reviewWord || ''} (${r.reviewCount || 0} reviews)`;
                    } else {
                        line = JSON.stringify(r);
                    }
                    const bg = i === 0 ? 'background:#e0e7ff;border-color:#a5b4fc;' : 'background:white;';
                    html += `<div onclick="document.getElementById('estimated-cost').value=${r.price||r.pricePerNight||r.totalPrice||0}" style="padding:0.55rem 0.75rem; border-radius:8px; border:1px solid #c7d2fe; cursor:pointer; ${bg} font-size:0.82rem; line-height:1.5;" title="Click to use this price">${i===0?'<span style="font-size:0.7rem;color:#4338ca;font-weight:700;margin-right:4px;">BEST</span>':''}${line}</div>`;
                });
                html += '</div>';
                content.innerHTML = html;
            } catch (err) {
                loadingLabel.style.display = 'none';
                content.innerHTML = `<p style="color:#e63946; font-size:0.82rem;">Could not fetch prices. ${err.message || ''}</p>`;
            }
        }

        document.getElementById('booking-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type=submit]');
            btn.disabled = true;
            btn.innerText = 'Submitting...';
            try {
                const type = document.getElementById('travel-type').value;
                const details = {
                    origin: document.getElementById('origin').value,
                    destination: document.getElementById('destination').value,
                    date: document.getElementById('travel-date').value,
                };
                if (type === 'HOTEL') {
                    const co = document.getElementById('checkout-date').value;
                    if (co) details.checkOut = co;
                }
                await apiRequest('/bookings', {
                    method: 'POST',
                    body: { type, details, cost: document.getElementById('estimated-cost').value }
                });
                hideBookingModal();
                await loadBookings();
            } catch (err) {
                alert(err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = 'Submit Request';
            }
        });

        // ── AI Chat Widget ────────────────────────────────────────
        function toggleChat() {
            chatOpen = !chatOpen;
            const panel = document.getElementById('chat-panel');
            panel.classList.toggle('open', chatOpen);

            if (chatOpen && chatMessages.length === 0) {
                const name = currentUser?.name?.split(' ')[0] || 'there';
                addBubble('assistant', `Hi ${name}! ✈️ I'm your TripFlow travel assistant.\n\nTell me where you need to go and I'll handle the booking. For example:\n*"I need to fly from Mumbai to Delhi on June 20"*`);
            }
            if (chatOpen) setTimeout(() => document.getElementById('chat-input').focus(), 100);
        }

        function addBubble(role, text) {
            const isUser = role === 'user';
            const wrap = document.createElement('div');
            wrap.className = 'chat-bubble';
            wrap.style.cssText = `display:flex; justify-content:${isUser ? 'flex-end' : 'flex-start'};`;

            const bubble = document.createElement('div');
            bubble.style.cssText = `
                max-width: 82%;
                padding: 0.65rem 0.95rem;
                border-radius: ${isUser ? '16px 16px 4px 16px' : '4px 16px 16px 16px'};
                background: ${isUser ? 'linear-gradient(135deg,#6366f1,#8b5cf6)' : 'white'};
                color: ${isUser ? 'white' : '#1e293b'};
                font-size: 0.855rem;
                line-height: 1.55;
                border: ${isUser ? 'none' : '1px solid #e2e8f0'};
                box-shadow: 0 1px 4px rgba(0,0,0,0.06);
                white-space: pre-wrap;
            `;
            bubble.innerHTML = text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>');

            wrap.appendChild(bubble);
            const msgs = document.getElementById('chat-messages');
            msgs.appendChild(wrap);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function showTyping() {
            const el = document.createElement('div');
            el.id = 'typing-dot';
            el.className = 'chat-bubble';
            el.style.cssText = 'display:flex; justify-content:flex-start;';
            el.innerHTML = `
                <div style="padding:0.65rem 1rem; border-radius:4px 16px 16px 16px; background:white; border:1px solid #e2e8f0; display:flex; gap:4px; align-items:center;">
                    <span style="width:7px;height:7px;background:#8b5cf6;border-radius:50%;animation:bounce 0.9s infinite;display:block;"></span>
                    <span style="width:7px;height:7px;background:#8b5cf6;border-radius:50%;animation:bounce 0.9s 0.18s infinite;display:block;"></span>
                    <span style="width:7px;height:7px;background:#8b5cf6;border-radius:50%;animation:bounce 0.9s 0.36s infinite;display:block;"></span>
                </div>`;
            const msgs = document.getElementById('chat-messages');
            msgs.appendChild(el);
            msgs.scrollTop = msgs.scrollHeight;
        }

        // ── Voice input ──────────────────────────────────────────────────────────
        let voiceRecognition = null;
        let voiceActive = false;

        function toggleVoice() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert('Voice input is not supported in this browser. Try Chrome or Edge.');
                return;
            }

            const btn = document.getElementById('voice-btn');

            if (voiceActive) {
                voiceRecognition?.stop();
                return;
            }

            voiceRecognition = new SpeechRecognition();
            voiceRecognition.lang = 'en-IN';
            voiceRecognition.interimResults = true;
            voiceRecognition.maxAlternatives = 1;

            voiceRecognition.onstart = () => {
                voiceActive = true;
                btn.style.background = '#fee2e2';
                btn.style.borderColor = '#ef4444';
                btn.title = 'Listening… click to stop';
                document.getElementById('chat-input').placeholder = 'Listening…';
            };

            voiceRecognition.onresult = (e) => {
                const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
                document.getElementById('chat-input').value = transcript;
            };

            voiceRecognition.onend = () => {
                voiceActive = false;
                btn.style.background = 'white';
                btn.style.borderColor = '#e2e8f0';
                btn.title = 'Voice input';
                const input = document.getElementById('chat-input');
                input.placeholder = 'Describe your travel need…';
                if (input.value.trim()) sendChat();
            };

            voiceRecognition.onerror = (e) => {
                voiceActive = false;
                btn.style.background = 'white';
                btn.style.borderColor = '#e2e8f0';
                if (e.error !== 'no-speech') {
                    addBubble('assistant', `🎤 Mic error: ${e.error}. Make sure mic permission is allowed.`);
                }
            };

            voiceRecognition.start();
        }

        async function sendChat() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            const sendBtn = document.getElementById('chat-send');
            input.value = '';
            input.disabled = true;
            sendBtn.disabled = true;

            chatMessages.push({ role: 'user', content: text });
            addBubble('user', text);
            showTyping();

            try {
                const data = await apiRequest('/ai/chat', {
                    method: 'POST',
                    body: { messages: chatMessages }
                });

                document.getElementById('typing-dot')?.remove();
                chatMessages.push({ role: 'assistant', content: data.reply });
                addBubble('assistant', data.reply);

                if (data.booking) await loadBookings();
            } catch (err) {
                document.getElementById('typing-dot')?.remove();
                addBubble('assistant', '❌ Something went wrong. Please try again.');
            } finally {
                input.disabled = false;
                sendBtn.disabled = false;
                input.focus();
            }
        }
    </script>
</body>
