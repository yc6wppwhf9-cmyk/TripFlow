<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - TripFlow</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f7f8fb;
      padding: 1rem;
    }

    .reset-panel {
      width: min(100%, 420px);
      background: #fff;
      border: 1px solid #dde2eb;
      border-radius: 8px;
      padding: 1.5rem;
      box-shadow: 0 12px 32px rgba(20, 32, 52, 0.08);
    }

    .reset-panel h1 {
      margin: 0 0 0.35rem;
      font-size: 1.45rem;
    }

    .reset-panel p {
      margin: 0 0 1rem;
      color: #647084;
      line-height: 1.5;
    }

    .reset-panel label {
      display: block;
      margin-bottom: 0.4rem;
      font-weight: 700;
      font-size: 0.85rem;
    }

    .reset-panel input {
      width: 100%;
      border: 1px solid #cfd6e2;
      border-radius: 6px;
      padding: 0.75rem;
      margin-bottom: 1rem;
      font-size: 1rem;
    }

    .reset-panel button {
      width: 100%;
      border: 0;
      border-radius: 6px;
      padding: 0.8rem 1rem;
      font-weight: 700;
      background: #1f6feb;
      color: #fff;
      cursor: pointer;
    }

    .reset-panel button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .message {
      min-height: 1.25rem;
      margin-top: 0.85rem;
      font-size: 0.9rem;
    }

    .message.error {
      color: #b42318;
    }

    .message.success {
      color: #067647;
    }
  </style>
</head>
<body>
  <main class="reset-panel">
    <h1>Reset Password</h1>
    <p>Enter a new password for your TripFlow account.</p>
    <form id="reset-form">
      <label for="password">New password</label>
      <input id="password" type="password" minlength="8" required autocomplete="new-password">
      <label for="confirm-password">Confirm password</label>
      <input id="confirm-password" type="password" minlength="8" required autocomplete="new-password">
      <button type="submit">Update password</button>
      <div id="message" class="message" role="status" aria-live="polite"></div>
    </form>
  </main>

  <script>
    const form = document.getElementById('reset-form');
    const message = document.getElementById('message');
    const token = new URLSearchParams(window.location.search).get('token');

    function setMessage(text, type) {
      message.textContent = text;
      message.className = `message ${type}`;
    }

    if (!token) {
      form.querySelector('button').disabled = true;
      setMessage('Reset token is missing. Please request a new password reset link.', 'error');
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const button = form.querySelector('button');

      if (password !== confirmPassword) {
        setMessage('Passwords do not match.', 'error');
        return;
      }

      button.disabled = true;
      setMessage('', '');

      try {
        const response = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Failed to reset password');
        setMessage('Password updated. Redirecting to login...', 'success');
        setTimeout(() => { window.location.href = '/index.html'; }, 1400);
      } catch (error) {
        setMessage(error.message, 'error');
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
