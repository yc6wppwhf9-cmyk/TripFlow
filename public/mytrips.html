<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripFlow | My Trips</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="main-sidebar">
        <div class="sidebar-brand">
            <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.25rem;">
                <img src="images/Logo.png" alt="TripFlow" style="width:32px;height:32px;object-fit:contain;border-radius:6px;flex-shrink:0;">
                <span style="font-family:var(--font-display);font-size:1.35rem;font-weight:700;letter-spacing:-0.02em;color:var(--primary);">TripFlow</span>
            </div>
            <p style="font-size:0.7rem;font-weight:700;text-transform:uppercase;color:var(--secondary);letter-spacing:0.05em;">Enterprise</p>
        </div>

        <button onclick="window.location.href='request.html'" style="width:100%;margin-bottom:1.5rem;">
            <span class="material-symbols-outlined">add</span>
            New Request
        </button>

        <nav class="sidebar-nav-links">
            <a href="employee.html">
                <span class="material-symbols-outlined">dashboard</span>
                Dashboard
            </a>
            <a href="mytrips.html" class="active">
                <span class="material-symbols-outlined">luggage</span>
                My Trips
            </a>
        </nav>

        <div style="margin-top:auto;display:flex;flex-direction:column;gap:0.25rem;">
            <a href="#" onclick="logout();return false;" style="text-decoration:none;color:var(--danger-text);font-family:var(--font-display);font-weight:600;font-size:0.8rem;padding:0.5rem 1rem;display:flex;align-items:center;gap:0.5rem;">
                <span class="material-symbols-outlined" style="font-size:18px;">logout</span>Logout
            </a>
        </div>
    </aside>

    <main class="main-wrapper">
        <header class="top-appbar">
            <div style="display:flex;align-items:center;gap:0.75rem;">
                <button class="sidebar-mobile-btn" onclick="toggleSidebar()" aria-label="Open menu">
                    <span class="bar"></span><span class="bar"></span><span class="bar"></span>
                </button>
                <h1 style="font-size:1.25rem;font-weight:600;margin:0;">My Trips</h1>
            </div>
            <div style="display:flex;align-items:center;gap:1rem;">
                <span id="user-name" style="font-family:var(--font-display);font-size:0.8rem;font-weight:600;border:1px solid var(--outline-variant);background:var(--surface-container-low);padding:0.25rem 0.75rem;border-radius:var(--radius-md);"></span>
            </div>
        </header>

        <div class="container" style="padding-top:2rem;">
            <section style="display:flex;flex-direction:column;gap:1rem;">
                <div class="section-title-bar">
                    <h3>My Trips</h3>
                    <div class="stb-line"></div>
                    <button onclick="window.location.href='request.html'" style="padding:0.45rem 1rem;font-size:0.8rem;white-space:nowrap;">
                        <span class="material-symbols-outlined" style="font-size:16px;">add</span> New
                    </button>
                </div>
                <div class="table-card">
                    <table>
                        <thead>
                            <tr>
                                <th>Type</th>
                                <th>Route</th>
                                <th>Status</th>
                                <th>Cost</th>
                                <th>PNR</th>
                                <th>Ticket</th>
                            </tr>
                        </thead>
                        <tbody id="bookings-list">
                            <tr><td colspan="6">
                                <div class="empty-state">
                                    <div class="empty-state-icon"><span class="material-symbols-outlined">flight_takeoff</span></div>
                                    <h4>No trips yet</h4>
                                    <p>Your upcoming and past bookings will appear here.</p>
                                    <button onclick="window.location.href='request.html'">
                                        <span class="material-symbols-outlined" style="font-size:16px;">add</span> Plan a Trip
                                    </button>
                                </div>
                            </td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const currentUser = checkAuth();

        function toggleSidebar() {
            document.getElementById('main-sidebar').classList.toggle('open');
            document.getElementById('sidebar-backdrop').classList.toggle('open');
        }

        function fmtDate(str) {
            if (!str) return '';
            const d = new Date(str);
            if (isNaN(d)) return str;
            return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function fmtTime(str) {
            if (!str) return '';
            const d = new Date(str);
            if (isNaN(d)) return str.toString().slice(0, 5);
            return d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
        }

        function fareLabel(f) {
            if (!f) return '';
            if (f.type === 'FLIGHT') {
                const times = f.departure && f.arrival
                    ? ` (${fmtTime(f.departure)} → ${fmtTime(f.arrival)})`
                    : f.departure ? ` (dep ${fmtTime(f.departure)})` : '';
                return `✈ ${f.airline || ''} ${f.flightNumber || ''}${times}`.trim();
            }
            if (f.type === 'TRAIN') {
                const times = f.departure && f.arrival ? ` (${fmtTime(f.departure)} → ${fmtTime(f.arrival)})` : '';
                return `🚂 ${f.trainNumber || ''} ${f.trainName || ''}${f.class ? ` [${f.class} Class]` : ''}${times}`.trim();
            }
            if (f.type === 'HOTEL') {
                return `🏨 ${f.name || ''}${f.rating ? ` · ★${f.rating}` : ''}${f.pricePerNight ? ` (₹${f.pricePerNight}/night)` : ''}`.trim();
            }
            return '';
        }

        async function init() {
            if (!currentUser) return;
            document.getElementById('user-name').innerText = currentUser.name.toUpperCase();
            await loadBookings();
        }

        async function loadBookings() {
            try {
                const bookings = await apiRequest('/bookings/mine');
                const list = document.getElementById('bookings-list');
                if (!bookings.length) {
                    list.innerHTML = `<tr><td colspan="6">
                        <div class="empty-state">
                            <div class="empty-state-icon"><span class="material-symbols-outlined">flight_takeoff</span></div>
                            <h4>No trips yet</h4>
                            <p>Your upcoming and past bookings will appear here.</p>
                            <button onclick="window.location.href='request.html'">
                                <span class="material-symbols-outlined" style="font-size:16px;">add</span> Plan a Trip
                            </button>
                        </div>
                    </td></tr>`;
                } else {
                    list.innerHTML = bookings.map(b => `
                        <tr>
                            <td data-label="Type"><span class="role-badge role-VENDOR">${b.type}</span></td>
                            <td data-label="Route">
                                <a href="detail.html?id=${b.id}" style="text-decoration:none;color:inherit;display:block;">
                                    <div style="font-weight:700;color:var(--on-surface);text-decoration:underline;text-underline-offset:2px;">${b.details.origin || '—'} → ${b.details.destination || '—'}</div>
                                    ${b.details.selectedFare ? `<div style="font-size:0.72rem;font-weight:600;color:var(--primary);margin-top:0.1rem;">${fareLabel(b.details.selectedFare)}</div>` : ''}
                                    <div style="font-size:0.75rem;font-weight:500;color:var(--secondary);margin-top:0.1rem;">${fmtDate(b.details.date)}</div>
                                </a>
                            </td>
                            <td data-label="Status"><span class="badge badge-${b.stage.toLowerCase().replace(/_/g,'-')}">${b.stage.replace(/_/g,' ')}</span></td>
                            <td data-label="Cost" style="font-family:var(--font-display);font-weight:700;color:var(--primary);">${b.cost ? '₹' + Number(b.cost).toLocaleString('en-IN') : '—'}</td>
                            <td data-label="PNR" style="font-family:monospace;font-size:0.85rem;color:var(--on-surface);font-weight:600;">${b.pnr || '—'}</td>
                            <td data-label="Ticket">${b.ticketUrl ? `<a href="${b.ticketUrl}" target="_blank" style="color:var(--primary);font-weight:600;text-decoration:none;font-size:0.82rem;">View ↗</a>` : '<span style="color:var(--outline);">—</span>'}</td>
                        </tr>`).join('');
                }
            } catch (err) {
                console.error(err.message);
            }
        }

        init();
    </script>
</body>
</html>
