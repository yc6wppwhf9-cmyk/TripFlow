<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripFlow | Vendor</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="dashboard-nav glass">
        <div class="logo">TripFlow</div>
        <div class="nav-links">
            <a href="#" class="active">Vendor Portal</a>
        </div>
        <div class="user-info">
            <span id="user-name" style="font-size:0.875rem;font-weight:600;color:#9aa3b5;"></span>
            <button onclick="logout()" class="secondary" style="padding:0.45rem 0.9rem;font-size:0.8rem;">Logout</button>
        </div>
        <button class="nav-toggle" aria-label="Menu" aria-expanded="false">
            <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        </button>
    </nav>

    <div class="container">
        <div style="margin-bottom:2rem;">
            <p class="page-label">Vendor Portal</p>
            <h1 id="company-name">Booking Requests</h1>
        </div>

        <!-- Stats -->
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.25rem;margin-bottom:2rem;">
            <div class="stat-card">
                <p class="stat-label">Pending Requests</p>
                <div class="stat-value" id="stat-pending">—</div>
            </div>
            <div class="stat-card">
                <p class="stat-label">Completed Trips</p>
                <div class="stat-value" id="stat-done">—</div>
            </div>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('pending',this)">
                Pending Requests
                <span id="pending-badge" style="background:#e74c3c;color:white;padding:0.05rem 0.5rem;border-radius:8px;font-size:0.7rem;margin-left:0.35rem;display:none;font-weight:800;"></span>
            </button>
            <button class="tab-btn" onclick="switchTab('completed',this)">Completed</button>
        </div>

        <!-- Pending Tab -->
        <div id="tab-pending" class="tab-content active">
            <div class="table-card">
                <table>
                    <thead><tr><th>Employee</th><th>Type</th><th>Route</th><th>Date</th><th>Est. Cost</th><th>Action</th></tr></thead>
                    <tbody id="requests-list"></tbody>
                </table>
            </div>
        </div>

        <!-- Completed Tab -->
        <div id="tab-completed" class="tab-content">
            <div class="table-card">
                <table>
                    <thead><tr><th>Employee</th><th>Type</th><th>Route</th><th>PNR</th><th>Cost</th><th>Ticket</th></tr></thead>
                    <tbody id="completed-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Upload Modal -->
    <div id="upload-modal" class="modal">
        <div class="modal-content" style="max-width:460px;">
            <h2 style="margin-bottom:0.4rem;">Upload Ticket &amp; PNR</h2>
            <p style="color:#5a6478;font-size:0.875rem;margin-bottom:1.75rem;">Once uploaded, the employee will be notified automatically.</p>
            <form id="upload-form">
                <input type="hidden" id="booking-id">
                <div class="form-group">
                    <label>PNR / Booking Reference</label>
                    <input type="text" id="pnr" required placeholder="e.g. AB1234 or CONF-789">
                </div>
                <div class="form-group">
                    <label>Ticket File (PDF or Image)</label>
                    <input type="file" id="ticket-file" required accept=".pdf,image/*" style="padding:0.6rem;">
                </div>
                <div id="upload-progress" style="display:none;margin-bottom:1rem;padding:0.75rem 1rem;background:rgba(212,168,83,0.08);border:1px solid rgba(212,168,83,0.15);border-radius:8px;font-size:0.835rem;color:#d4a853;">
                    Uploading ticket…
                </div>
                <div style="display:flex;gap:0.75rem;">
                    <button type="submit" id="upload-btn" style="flex:1;">Upload &amp; Complete</button>
                    <button type="button" onclick="hideUploadModal()" class="secondary" style="flex:0.5;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        async function init() {
            const user = checkAuth();
            if (!user) return;
            document.getElementById('user-name').innerText = user.name;
            showTableSkeleton('requests-list', 6);
            showTableSkeleton('completed-list', 6);
            loadRequests();
            loadCompleted();
        }
        init();

        function switchTab(name, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('tab-' + name).classList.add('active');
        }

        async function loadRequests() {
            try {
                const requests = await apiRequest('/vendor/requests');
                const badge    = document.getElementById('pending-badge');
                document.getElementById('stat-pending').innerText = requests.length;
                if (requests.length) { badge.innerText = requests.length; badge.style.display = 'inline'; }

                const list = document.getElementById('requests-list');
                if (!requests.length) {
                    list.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="empty-state-icon">✅</div><p>No pending requests</p></div></td></tr>'; return;
                }
                list.innerHTML = requests.map(b => `
                    <tr>
                        <td data-label="Employee">
                            <div style="font-weight:600;">${b.employee.user.name}</div>
                            <div style="font-size:0.78rem;color:#5a6478;">${b.employee.department}</div>
                        </td>
                        <td data-label="Type"><span class="badge badge-pending-vendor">${b.type}</span></td>
                        <td data-label="Route">${b.details.origin} → ${b.details.destination}</td>
                        <td data-label="Date" style="color:#9aa3b5;font-size:0.82rem;">${b.details.date}</td>
                        <td data-label="Est. Cost" style="font-weight:700;color:#d4a853;">₹${b.cost ? Number(b.cost).toLocaleString('en-IN') : '—'}</td>
                        <td data-label="Action"><button onclick="showUploadModal('${b.id}')" style="font-size:0.82rem;width:100%;">Process &amp; Upload</button></td>
                    </tr>`).join('');
            } catch(err) { console.error(err.message); }
        }

        async function loadCompleted() {
            try {
                const completed = await apiRequest('/vendor/completed');
                document.getElementById('stat-done').innerText = completed.length;
                const list = document.getElementById('completed-list');
                if (!completed.length) {
                    list.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="empty-state-icon">📋</div><p>No completed bookings yet</p></div></td></tr>'; return;
                }
                list.innerHTML = completed.map(b => `
                    <tr>
                        <td data-label="Employee" style="font-weight:600;">${b.employee.user.name}</td>
                        <td data-label="Type" style="color:#9aa3b5;font-size:0.82rem;">${b.type}</td>
                        <td data-label="Route">${b.details.origin} → ${b.details.destination}</td>
                        <td data-label="PNR" style="font-family:monospace;color:#d4a853;font-weight:700;font-size:0.82rem;">${b.pnr || '—'}</td>
                        <td data-label="Cost" style="font-weight:600;">₹${b.cost ? Number(b.cost).toLocaleString('en-IN') : '—'}</td>
                        <td data-label="Ticket">${b.ticketUrl ? `<a href="${b.ticketUrl}" target="_blank" style="color:#d4a853;font-weight:600;text-decoration:none;font-size:0.82rem;">View ↗</a>` : '—'}</td>
                    </tr>`).join('');
            } catch(err) { console.error(err.message); }
        }

        function showUploadModal(id) {
            document.getElementById('booking-id').value = id;
            document.getElementById('pnr').value = '';
            document.getElementById('ticket-file').value = '';
            document.getElementById('upload-progress').style.display = 'none';
            document.getElementById('upload-modal').style.display = 'flex';
        }
        function hideUploadModal() { document.getElementById('upload-modal').style.display = 'none'; }

        document.getElementById('upload-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id   = document.getElementById('booking-id').value;
            const pnr  = document.getElementById('pnr').value;
            const file = document.getElementById('ticket-file').files[0];
            const btn  = document.getElementById('upload-btn');
            const prog = document.getElementById('upload-progress');
            const formData = new FormData();
            formData.append('pnr', pnr);
            formData.append('ticket', file);
            btn.disabled = true; btn.innerText = 'Uploading…';
            prog.style.display = 'block';
            try {
                await apiRequest(`/vendor/${id}/upload-ticket`, { method: 'POST', body: formData });
                hideUploadModal();
                showToast('Ticket uploaded! Employee has been notified.', 'success');
                loadRequests(); loadCompleted();
            } catch(err) {
                showToast('Upload failed: ' + err.message, 'error');
            } finally {
                btn.disabled = false; btn.innerText = 'Upload & Complete';
                prog.style.display = 'none';
            }
        });
    </script>
</body>
</html>
