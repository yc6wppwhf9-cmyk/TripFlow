<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripFlow | Manager Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="dashboard-nav glass">
        <div class="logo">TripFlow</div>
        <div class="nav-links">
            <a href="#" class="active">Approvals</a>
        </div>
        <div class="user-info">
            <span id="user-name" style="font-weight: 600; color: var(--text-main);"></span>
            <button onclick="logout()" class="secondary" style="width: auto; padding: 0.6rem 1.2rem;">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="header-actions" style="margin-bottom: 3rem;">
            <p style="color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.8rem; margin-bottom: 0.5rem;">Manager Portal</p>
            <h1>Pending Approvals</h1>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Employee</th>
                        <th>Type</th>
                        <th>Details</th>
                        <th>Est. Cost</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="approvals-list">
                    <!-- Loaded dynamically -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Approval Modal -->
    <div id="approval-modal" class="modal">
        <div class="modal-content">
            <h2>Approve Request</h2>
            <form id="approval-form" style="margin-top: 1.5rem;">
                <input type="hidden" id="booking-id">
                <div class="form-group">
                    <label>Assign Vendor</label>
                    <select id="vendor-id" required>
                        <!-- Vendors loaded dynamically -->
                    </select>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button type="submit">Confirm Approval</button>
                    <button type="button" onclick="hideModal('approval-modal')" class="secondary">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="rejection-modal" class="modal">
        <div class="modal-content">
            <h2>Reject Request</h2>
            <form id="rejection-form" style="margin-top: 1.5rem;">
                <input type="hidden" id="reject-booking-id">
                <div class="form-group">
                    <label>Reason for Rejection</label>
                    <textarea id="rejection-reason" required placeholder="Enter reason..."></textarea>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button type="submit" style="background: #e63946;">Reject Request</button>
                    <button type="button" onclick="hideModal('rejection-modal')" class="secondary">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const user = checkAuth();
        let vendors = [];

        if (user) {
            updateUserInfo();
            loadApprovals();
            loadVendors();
        }

        async function loadApprovals() {
            try {
                const approvals = await apiRequest('/approvals/pending');
                const list = document.getElementById('approvals-list');
                list.innerHTML = approvals.map(b => `
                    <tr>
                        <td><strong>${b.employee.user.name}</strong><br><small>${b.employee.department}</small></td>
                        <td>${b.type}</td>
                        <td>${b.details.origin} to ${b.details.destination} (${b.details.date})</td>
                        <td>$${b.cost}</td>
                        <td>
                            <button onclick="showApproveModal('${b.id}')" style="width: auto; padding: 0.4rem 0.8rem; font-size: 0.85rem; background: #2a9d8f;">Approve</button>
                            <button onclick="showRejectModal('${b.id}')" style="width: auto; padding: 0.4rem 0.8rem; font-size: 0.85rem; background: #e63946; margin-left: 0.5rem;">Reject</button>
                        </td>
                    </tr>
                `).join('') || '<tr><td colspan="5" style="text-align:center;">No pending approvals</td></tr>';
            } catch (err) {
                alert(err.message);
            }
        }

        async function loadVendors() {
            try {
                const data = await apiRequest('/approvals/vendors');
                const vendorSelect = document.getElementById('vendor-id');
                if (!data.length) {
                    vendorSelect.innerHTML = '<option value="">No vendors available</option>';
                    return;
                }
                vendorSelect.innerHTML = '<option value="">Select a vendor</option>' +
                    data.map(v => `<option value="${v.id}">${v.companyName} (${v.serviceType})</option>`).join('');
            } catch (err) {
                console.error('Could not load vendors:', err.message);
            }
        }

        function showApproveModal(id) {
            document.getElementById('booking-id').value = id;
            document.getElementById('approval-modal').style.display = 'flex';
        }

        function showRejectModal(id) {
            document.getElementById('reject-booking-id').value = id;
            document.getElementById('rejection-modal').style.display = 'flex';
        }

        function hideModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        document.getElementById('approval-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('booking-id').value;
            const vendorId = document.getElementById('vendor-id').value;

            try {
                await apiRequest(`/approvals/${id}/approve`, {
                    method: 'POST',
                    body: { vendorId }
                });
                hideModal('approval-modal');
                loadApprovals();
                alert('Request approved and sent to vendor!');
            } catch (err) {
                alert(err.message);
            }
        });

        document.getElementById('rejection-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('reject-booking-id').value;
            const reason = document.getElementById('rejection-reason').value;

            try {
                await apiRequest(`/approvals/${id}/reject`, {
                    method: 'POST',
                    body: { reason }
                });
                hideModal('rejection-modal');
                loadApprovals();
                alert('Request rejected.');
            } catch (err) {
                alert(err.message);
            }
        });
    </script>
</body>
</html>
