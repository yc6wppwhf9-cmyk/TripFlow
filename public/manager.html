<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripFlow | Manager</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .tab-nav { display:flex;gap:0.5rem;margin-bottom:2.5rem;border-bottom:2px solid #f1f5f9;padding-bottom:0; }
        .tab-btn { padding:0.75rem 1.5rem;border:none;background:none;cursor:pointer;font-size:0.95rem;font-weight:600;color:var(--text-muted);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all 0.2s; }
        .tab-btn.active { color:#6366f1;border-bottom-color:#6366f1; }
        .tab-content { display:none; }
        .tab-content.active { display:block; }
    </style>
</head>
<body>
    <nav class="dashboard-nav glass">
        <div class="logo">TripFlow</div>
        <div class="nav-links">
            <a href="#" class="active">Manager Portal</a>
        </div>
        <div class="user-info">
            <span id="user-name" style="font-weight:600;color:var(--text-main);"></span>
            <button onclick="logout()" class="secondary" style="width:auto;padding:0.6rem 1.2rem;">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div style="margin-bottom:2.5rem;">
            <p style="color:var(--text-muted);font-weight:500;text-transform:uppercase;letter-spacing:0.1em;font-size:0.8rem;margin-bottom:0.4rem;">Manager Portal</p>
            <h1>Travel Approvals</h1>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('pending')">
                Pending Approvals <span id="pending-count" style="background:#6366f1;color:white;padding:0.1rem 0.5rem;border-radius:12px;font-size:0.75rem;margin-left:0.4rem;"></span>
            </button>
            <button class="tab-btn" onclick="switchTab('team')">My Team</button>
        </div>

        <!-- Pending Approvals Tab -->
        <div id="tab-pending" class="tab-content active">
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>Employee</th><th>Type</th><th>Route & Date</th><th>Est. Cost</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="approvals-list">
                        <tr><td colspan="5" style="text-align:center;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- My Team Tab -->
        <div id="tab-team" class="tab-content">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
                <h3>Team Bookings</h3>
                <select id="team-filter" onchange="filterTeam()" style="padding:0.5rem 1rem;border:1px solid #e2e8f0;border-radius:8px;">
                    <option value="">All Stages</option>
                    <option value="PENDING_MANAGER">Pending Approval</option>
                    <option value="PENDING_VENDOR">With Vendor</option>
                    <option value="COMPLETED">Completed</option>
                    <option value="REJECTED">Rejected</option>
                </select>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>Employee</th><th>Type</th><th>Route</th><th>Stage</th><th>Cost</th><th>PNR</th></tr>
                    </thead>
                    <tbody id="team-list">
                        <tr><td colspan="6" style="text-align:center;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Approve Modal -->
    <div id="approval-modal" class="modal">
        <div class="modal-content" style="max-width:460px;">
            <h2>Approve Request</h2>
            <p style="color:var(--text-muted);margin-bottom:1.5rem;">Select a vendor to handle this booking.</p>
            <form id="approval-form">
                <input type="hidden" id="booking-id">
                <div class="form-group">
                    <label>Assign Vendor</label>
                    <select id="vendor-id" required style="width:100%;">
                        <option value="">Loading vendors...</option>
                    </select>
                </div>
                <div style="display:flex;gap:1rem;margin-top:2rem;">
                    <button type="submit" style="flex:1;">Confirm Approval</button>
                    <button type="button" onclick="hideModal('approval-modal')" class="secondary" style="flex:0.5;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Reject Modal -->
    <div id="rejection-modal" class="modal">
        <div class="modal-content" style="max-width:460px;">
            <h2>Reject Request</h2>
            <form id="rejection-form">
                <input type="hidden" id="reject-booking-id">
                <div class="form-group" style="margin-top:1.5rem;">
                    <label>Reason for Rejection</label>
                    <textarea id="rejection-reason" required rows="4" placeholder="e.g. Cost exceeds policy limit. Please resubmit with a lower-cost option." style="width:100%;border:1px solid #e2e8f0;border-radius:8px;padding:0.75rem;font-family:inherit;"></textarea>
                </div>
                <div style="display:flex;gap:1rem;margin-top:2rem;">
                    <button type="submit" style="flex:1;background:#e63946;">Reject Request</button>
                    <button type="button" onclick="hideModal('rejection-modal')" class="secondary" style="flex:0.5;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let allTeamBookings = [];

        async function init() {
            const user = checkAuth();
            if (!user) return;
            document.getElementById('user-name').innerText = user.name;
            loadApprovals();
            loadVendors();
            loadTeamBookings();
        }
        init();

        function switchTab(name) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-' + name).classList.add('active');
        }

        async function loadApprovals() {
            try {
                const approvals = await apiRequest('/approvals/pending');
                const count = document.getElementById('pending-count');
                count.innerText = approvals.length || '';
                count.style.display = approvals.length ? 'inline' : 'none';

                const list = document.getElementById('approvals-list');
                if (!approvals.length) {
                    list.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-muted);">✅ No pending approvals</td></tr>';
                    return;
                }
                list.innerHTML = approvals.map(b => `
                    <tr>
                        <td>
                            <strong>${b.employee.user.name}</strong><br>
                            <small style="color:var(--text-muted);">${b.employee.department}</small>
                        </td>
                        <td><span class="badge badge-pending-manager">${b.type}</span></td>
                        <td>
                            <div style="font-weight:500;">${b.details.origin} → ${b.details.destination}</div>
                            <div style="font-size:0.8rem;color:var(--text-muted);">${b.details.date}</div>
                        </td>
                        <td style="font-weight:700;color:#6366f1;">$${b.cost || '—'}</td>
                        <td>
                            <button onclick="showApproveModal('${b.id}')" style="width:auto;padding:0.4rem 0.9rem;font-size:0.85rem;background:#059669;margin-right:0.4rem;">Approve</button>
                            <button onclick="showRejectModal('${b.id}')" style="width:auto;padding:0.4rem 0.9rem;font-size:0.85rem;background:#e63946;">Reject</button>
                        </td>
                    </tr>`).join('');
            } catch(err) {
                console.error(err.message);
            }
        }

        async function loadVendors() {
            try {
                const vendors = await apiRequest('/approvals/vendors');
                const sel = document.getElementById('vendor-id');
                if (!vendors.length) {
                    sel.innerHTML = '<option value="">No vendors available — ask admin to add one</option>';
                    return;
                }
                sel.innerHTML = '<option value="">Select a vendor...</option>' +
                    vendors.map(v => `<option value="${v.id}">${v.companyName} (${v.serviceType})</option>`).join('');
            } catch(err) {
                console.error('Could not load vendors:', err.message);
            }
        }

        async function loadTeamBookings() {
            try {
                const approvals = await apiRequest('/approvals/pending');
                allTeamBookings = approvals;
                renderTeam(allTeamBookings);
            } catch(err) {
                console.error(err.message);
            }
        }

        function renderTeam(list) {
            const tbody = document.getElementById('team-list');
            if (!list.length) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text-muted);">No bookings found</td></tr>';
                return;
            }
            tbody.innerHTML = list.map(b => `
                <tr>
                    <td style="font-weight:600;">${b.employee?.user?.name || '—'}</td>
                    <td>${b.type}</td>
                    <td>${b.details?.origin || '—'} → ${b.details?.destination || '—'}</td>
                    <td><span class="badge badge-${b.stage.toLowerCase().replace(/_/g,'-')}">${b.stage.replace(/_/g,' ')}</span></td>
                    <td style="font-weight:600;">$${b.cost || '—'}</td>
                    <td style="font-family:monospace;color:var(--accent);">${b.pnr || '—'}</td>
                </tr>`).join('');
        }

        function filterTeam() {
            const stage = document.getElementById('team-filter').value;
            renderTeam(stage ? allTeamBookings.filter(b => b.stage === stage) : allTeamBookings);
        }

        function showApproveModal(id) {
            document.getElementById('booking-id').value = id;
            document.getElementById('approval-modal').style.display = 'flex';
        }

        function showRejectModal(id) {
            document.getElementById('reject-booking-id').value = id;
            document.getElementById('rejection-modal').style.display = 'flex';
        }

        function hideModal(id) { document.getElementById(id).style.display = 'none'; }

        document.getElementById('approval-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type=submit]');
            btn.disabled = true; btn.innerText = 'Approving...';
            try {
                await apiRequest(`/approvals/${document.getElementById('booking-id').value}/approve`, {
                    method: 'POST',
                    body: { vendorId: document.getElementById('vendor-id').value }
                });
                hideModal('approval-modal');
                loadApprovals();
                loadTeamBookings();
            } catch(err) {
                alert(err.message);
            } finally {
                btn.disabled = false; btn.innerText = 'Confirm Approval';
            }
        });

        document.getElementById('rejection-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type=submit]');
            btn.disabled = true; btn.innerText = 'Rejecting...';
            try {
                await apiRequest(`/approvals/${document.getElementById('reject-booking-id').value}/reject`, {
                    method: 'POST',
                    body: { reason: document.getElementById('rejection-reason').value }
                });
                hideModal('rejection-modal');
                document.getElementById('rejection-reason').value = '';
                loadApprovals();
                loadTeamBookings();
            } catch(err) {
                alert(err.message);
            } finally {
                btn.disabled = false; btn.innerText = 'Reject Request';
            }
        });
    </script>
</body>
</html>
