<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripFlow | Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="dashboard-nav glass">
        <div class="logo">TripFlow</div>
        <div class="nav-links">
            <a href="#" class="active">Manager Portal</a>
        </div>
        <div class="user-info">
            <span id="user-name" style="font-size:0.875rem;font-weight:600;color:#9aa3b5;"></span>
            <button onclick="logout()" class="secondary" style="padding:0.45rem 0.9rem;font-size:0.8rem;">Logout</button>
        </div>
        <button class="nav-toggle" aria-label="Menu" aria-expanded="false">
            <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        </button>
    </nav>

    <div class="container">
        <div style="margin-bottom:2rem;">
            <p class="page-label">Manager Portal</p>
            <h1>Travel Approvals</h1>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('pending',this)">
                Pending
                <span id="pending-count" style="background:#d4a853;color:#0e1117;padding:0.05rem 0.5rem;border-radius:8px;font-size:0.7rem;margin-left:0.35rem;display:none;font-weight:800;"></span>
            </button>
            <button class="tab-btn" onclick="switchTab('team',this)">My Team</button>
        </div>

        <!-- Pending Tab -->
        <div id="tab-pending" class="tab-content active">
            <div class="table-card">
                <table>
                    <thead><tr><th>Employee</th><th>Type</th><th>Route &amp; Date</th><th>Est. Cost</th><th>Actions</th></tr></thead>
                    <tbody id="approvals-list"></tbody>
                </table>
            </div>
        </div>

        <!-- Team Tab -->
        <div id="tab-team" class="tab-content">
            <div class="section-header">
                <h3>Team Bookings</h3>
                <select id="team-filter" onchange="filterTeam()" style="padding:0.45rem 0.9rem;font-size:0.82rem;width:auto;">
                    <option value="">All Stages</option>
                    <option value="PENDING_MANAGER">Pending Approval</option>
                    <option value="PENDING_VENDOR">With Vendor</option>
                    <option value="COMPLETED">Completed</option>
                    <option value="REJECTED">Rejected</option>
                </select>
            </div>
            <div class="table-card">
                <table>
                    <thead><tr><th>Employee</th><th>Type</th><th>Route</th><th>Stage</th><th>Cost</th><th>PNR</th></tr></thead>
                    <tbody id="team-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Approve Modal -->
    <div id="approval-modal" class="modal">
        <div class="modal-content" style="max-width:460px;">
            <h2 style="margin-bottom:0.4rem;">Approve Request</h2>
            <p style="color:#5a6478;font-size:0.875rem;margin-bottom:1.75rem;">Select a vendor to handle this booking.</p>
            <form id="approval-form">
                <input type="hidden" id="booking-id">
                <div class="form-group">
                    <label>Assign Vendor</label>
                    <select id="vendor-id" required><option value="">Loading vendors…</option></select>
                </div>
                <div style="display:flex;gap:0.75rem;margin-top:2rem;">
                    <button type="submit" style="flex:1;">Confirm Approval</button>
                    <button type="button" onclick="hideModal('approval-modal')" class="secondary" style="flex:0.5;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Reject Modal -->
    <div id="rejection-modal" class="modal">
        <div class="modal-content" style="max-width:460px;">
            <h2 style="margin-bottom:0.4rem;">Reject Request</h2>
            <p style="color:#5a6478;font-size:0.875rem;margin-bottom:1.75rem;">The employee will be notified with your reason.</p>
            <form id="rejection-form">
                <input type="hidden" id="reject-booking-id">
                <div class="form-group">
                    <label>Reason for Rejection</label>
                    <textarea id="rejection-reason" required rows="4" placeholder="e.g. Cost exceeds policy limit. Please resubmit with a lower-cost option."></textarea>
                </div>
                <div style="display:flex;gap:0.75rem;margin-top:2rem;">
                    <button type="submit" class="danger" style="flex:1;">Reject Request</button>
                    <button type="button" onclick="hideModal('rejection-modal')" class="secondary" style="flex:0.5;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let allTeamBookings = [];

        async function init() {
            const user = checkAuth();
            if (!user) return;
            document.getElementById('user-name').innerText = user.name;
            showTableSkeleton('approvals-list', 5);
            showTableSkeleton('team-list', 6);
            loadApprovals();
            loadVendors();
            loadTeamBookings();
        }
        init();

        function switchTab(name, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('tab-' + name).classList.add('active');
        }

        async function loadApprovals() {
            try {
                const approvals = await apiRequest('/approvals/pending');
                const badge     = document.getElementById('pending-count');
                if (approvals.length) { badge.innerText = approvals.length; badge.style.display = 'inline'; }
                else badge.style.display = 'none';

                const list = document.getElementById('approvals-list');
                if (!approvals.length) {
                    list.innerHTML = '<tr><td colspan="5"><div class="empty-state"><div class="empty-state-icon">✅</div><p>No pending approvals</p></div></td></tr>'; return;
                }
                list.innerHTML = approvals.map(b => `
                    <tr>
                        <td data-label="Employee">
                            <div style="font-weight:600;">${b.employee.user.name}</div>
                            <div style="font-size:0.78rem;color:#5a6478;">${b.employee.department}</div>
                        </td>
                        <td data-label="Type"><span class="badge badge-pending-manager">${b.type}</span></td>
                        <td data-label="Route &amp; Date">
                            <div style="font-weight:500;">${b.details.origin} → ${b.details.destination}</div>
                            <div style="font-size:0.78rem;color:#5a6478;">${b.details.date}</div>
                        </td>
                        <td data-label="Est. Cost" style="font-weight:700;color:#d4a853;">₹${b.cost ? Number(b.cost).toLocaleString('en-IN') : '—'}</td>
                        <td data-label="Actions">
                            <div style="display:flex;gap:0.5rem;">
                                <button onclick="showApproveModal('${b.id}')" style="font-size:0.82rem;background:#2ecc71;color:#0e1117;flex:1;">Approve</button>
                                <button onclick="showRejectModal('${b.id}')" class="danger" style="font-size:0.82rem;flex:1;">Reject</button>
                            </div>
                        </td>
                    </tr>`).join('');
            } catch(err) { console.error(err.message); }
        }

        async function loadVendors() {
            try {
                const vendors = await apiRequest('/approvals/vendors');
                const sel = document.getElementById('vendor-id');
                if (!vendors.length) { sel.innerHTML = '<option value="">No vendors — ask admin to add one</option>'; return; }
                sel.innerHTML = '<option value="">Select a vendor…</option>' + vendors.map(v => `<option value="${v.id}">${v.companyName} (${v.serviceType})</option>`).join('');
            } catch(err) { console.error(err.message); }
        }

        async function loadTeamBookings() {
            try {
                allTeamBookings = await apiRequest('/approvals/team');
                renderTeam(allTeamBookings);
            } catch(err) { console.error(err.message); }
        }

        function renderTeam(list) {
            const stage    = document.getElementById('team-filter').value;
            const filtered = stage ? list.filter(b => b.stage === stage) : list;
            const tbody    = document.getElementById('team-list');
            if (!filtered.length) {
                tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="empty-state-icon">👥</div><p>No bookings found</p></div></td></tr>'; return;
            }
            tbody.innerHTML = filtered.map(b => `
                <tr>
                    <td data-label="Employee">
                        <div style="font-weight:600;">${b.employee?.user?.name || '—'}</div>
                        <div style="font-size:0.78rem;color:#5a6478;">${b.employee?.department || ''}</div>
                    </td>
                    <td data-label="Type" style="color:#9aa3b5;font-size:0.82rem;">${b.type}</td>
                    <td data-label="Route">${b.details?.origin || '—'} → ${b.details?.destination || '—'}</td>
                    <td data-label="Stage"><span class="badge badge-${b.stage.toLowerCase().replace(/_/g,'-')}">${b.stage.replace(/_/g,' ')}</span></td>
                    <td data-label="Cost" style="font-weight:600;color:#d4a853;">₹${b.cost ? Number(b.cost).toLocaleString('en-IN') : '—'}</td>
                    <td data-label="PNR" style="font-family:monospace;font-size:0.82rem;color:#9aa3b5;">${b.pnr || '—'}</td>
                </tr>`).join('');
        }

        function filterTeam() { renderTeam(allTeamBookings); }

        function showApproveModal(id) { document.getElementById('booking-id').value = id; document.getElementById('approval-modal').style.display = 'flex'; }
        function showRejectModal(id)  { document.getElementById('reject-booking-id').value = id; document.getElementById('rejection-modal').style.display = 'flex'; }
        function hideModal(id)        { document.getElementById(id).style.display = 'none'; }

        document.getElementById('approval-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type=submit]');
            btn.disabled = true; btn.innerText = 'Approving…';
            try {
                await apiRequest(`/approvals/${document.getElementById('booking-id').value}/approve`, { method: 'POST', body: { vendorId: document.getElementById('vendor-id').value } });
                hideModal('approval-modal');
                showToast('Booking approved and sent to vendor.', 'success');
                loadApprovals(); loadTeamBookings();
            } catch(err) {
                showToast(err.message, 'error');
            } finally {
                btn.disabled = false; btn.innerText = 'Confirm Approval';
            }
        });

        document.getElementById('rejection-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type=submit]');
            btn.disabled = true; btn.innerText = 'Rejecting…';
            try {
                await apiRequest(`/approvals/${document.getElementById('reject-booking-id').value}/reject`, { method: 'POST', body: { reason: document.getElementById('rejection-reason').value } });
                hideModal('rejection-modal');
                document.getElementById('rejection-reason').value = '';
                showToast('Request rejected and employee notified.', 'warning');
                loadApprovals(); loadTeamBookings();
            } catch(err) {
                showToast(err.message, 'error');
            } finally {
                btn.disabled = false; btn.innerText = 'Reject Request';
            }
        });
    </script>
</body>
</html>
