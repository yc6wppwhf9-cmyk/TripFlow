services:
  - type: web
    name: tripflow
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: INTERAKT_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: UPLOADTHING_TOKEN
        sync: false
      - key: REDIS_URL
        sync: false
